<!DOCTYPE html>

<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>System Error</title>

    <style>

        body {
            font-family: Arial, sans-serif;
            text-align: center;
            margin-top: 100px;
            background: #f8f9fa;
        }

        .error-box {
            background: white;
            padding: 40px;
            border-radius: 8px;
            width: 480px;
            margin: auto;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }

        h1 {
            color: #dc3545;
            margin-bottom: 15px;
        }

        .message {
            color: #444;
            font-size: 15px;
            margin-top: 10px;
        }

        .error-message {
            margin-top: 20px;
            color: #b02a37;
            font-size: 15px;
            font-weight: 500;
        }

        .info-message {
            color: #6c757d;
            margin-top: 15px;
        }

        .home-link {
            text-decoration: none;
            color: white;
            background: #007bff;
            padding: 10px 20px;
            border-radius: 4px;
            display: inline-block;
            margin-top: 25px;
        }

        .home-link:hover {
            background: #0056b3;
        }

    </style>

</head>

<body>

<div class="error-box">
    <h1>Something went wrong</h1>

    <p class="message">
        An unexpected error occurred while processing your request.
    </p>

    <!-- Display detailed message if provided -->
    <p class="error-message"
       th:if="${errorMessage != null}"
       th:text="${errorMessage}">
        Error message details
    </p>

    <!-- Fallback message -->
    <p class="info-message"
       th:if="${errorMessage == null}">
        Please try again later. If the issue persists, contact support.
    </p>

    <a class="home-link" th:href="@{/}">
        Return Home
    </a>

</div>

</body>
</html>
