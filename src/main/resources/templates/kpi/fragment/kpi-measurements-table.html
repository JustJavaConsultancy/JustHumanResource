<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>KPI Measurements Table Fragment</title>
</head>
<body>
<div id="measurementsTable">
    <table class="w-full">
        <thead class="bg-gray-50 dark:bg-gray-750">
        <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Employee</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Period</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400">KPI</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Actual Value</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Score</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 dark:text-gray-400">Actions</th>
        </tr>
        </thead>

        <!-- Table body: data rows -->
        <tbody th:if="${not #lists.isEmpty(measurements)}">
        <tr th:each="measurement : ${measurements}"
            th:id="'measurement-row-' + ${measurement.measurementId}"
            class="table-row border-b border-gray-100 dark:border-gray-700">

            <!-- Employee -->
            <td class="px-4 py-3">
                <div th:text="${measurement.employee.firstName + ' ' + measurement.employee.lastName}"
                     class="font-medium text-sm">Jane Smith</div>
                <div th:text="${measurement.employee.department.name}"
                     class="text-xs text-gray-500 dark:text-gray-400">Engineering</div>
            </td>

            <!-- Period -->
            <td th:text="${#temporals.format(measurement.period, 'MMMM yyyy')}"
                class="px-4 py-3 text-sm">January 2024</td>

            <!-- KPI Name -->
            <td class="px-4 py-3">
                <div th:text="${measurement.kpiName}" class="text-sm font-medium">KPI Name</div>
                <div th:text="${measurement.kpiCode}" class="text-xs text-gray-400">KPI001</div>
            </td>

            <!-- Actual Value — display mode -->
            <td class="px-4 py-3" th:id="'actual-cell-' + ${measurement.measurementId}">
                <span th:text="${measurement.actualValue}" class="text-sm">85</span>
            </td>

            <!-- Score — display mode -->
            <td class="px-4 py-3" th:id="'score-cell-' + ${measurement.measurementId}">
                <div class="flex items-center">
                    <div class="w-16 bg-gray-200 dark:bg-gray-700 rounded-full h-2 mr-2">
                        <div class="h-2 rounded-full kpi-score-excellent"
                             th:style="${'width:' + measurement.score + '%'}"></div>
                    </div>
                    <span th:text="${measurement.score}" class="text-sm font-medium">92.8</span>
                </div>
            </td>

            <!-- Actions -->
            <td class="px-4 py-3" th:id="'actions-cell-' + ${measurement.measurementId}">
                <button
                        th:onclick="'startEditMeasurement(' + ${measurement.measurementId} + ', ' + ${measurement.actualValue} + ')'"
                        class="text-blue-600 hover:text-blue-900 dark:text-blue-400 dark:hover:text-blue-300"
                        title="Edit measurement">
                    <span class="material-icons-round text-sm">edit</span>
                </button>
            </td>
        </tr>
        </tbody>

        <!-- Empty state -->
        <tbody th:if="${#lists.isEmpty(measurements)}">
        <tr>
            <td colspan="6" class="px-4 py-8 text-center text-gray-500 dark:text-gray-400">
                <span class="material-icons-round block text-3xl mb-2 opacity-40">bar_chart</span>
                No measurements found.
            </td>
        </tr>
        </tbody>
    </table>
</div>

<script>
    /**
     * Switches a row into inline-edit mode.
     */
    function startEditMeasurement(measurementId, currentActualValue) {
        const actualCell   = document.getElementById('actual-cell-'  + measurementId);
        const scoreCell    = document.getElementById('score-cell-'   + measurementId);
        const actionsCell  = document.getElementById('actions-cell-' + measurementId);

        actualCell.innerHTML = `
            <input
                id="edit-input-${measurementId}"
                type="number"
                step="0.01"
                min="0"
                value="${currentActualValue}"
                class="w-24 px-2 py-1 text-sm border border-blue-400 rounded-lg
                       focus:outline-none focus:ring-2 focus:ring-blue-500
                       dark:bg-gray-700 dark:border-blue-500 dark:text-gray-100"
            />
        `;

        scoreCell.innerHTML = `
            <span id="score-preview-${measurementId}" class="text-xs text-gray-400 italic">
                Enter value →
            </span>
        `;

        actionsCell.innerHTML = `
            <button onclick="saveMeasurement(${measurementId})"
                    class="text-green-600 hover:text-green-800 dark:text-green-400 mr-2"
                    title="Save">
                <span class="material-icons-round text-xl">check_circle</span>
            </button>
            <button onclick="cancelEditMeasurement(${measurementId})"
                    class="text-red-500 hover:text-red-700 dark:text-red-400 dark:hover:text-red-300"
                    title="Cancel">
                <span class="material-icons-round text-xl">cancel</span>
            </button>
        `;

        const input = document.getElementById('edit-input-' + measurementId);
        input.focus();
        input.select();

        input.addEventListener('keydown', function(e) {
            if (e.key === 'Enter')  saveMeasurement(measurementId);
            if (e.key === 'Escape') cancelEditMeasurement(measurementId);
        });
    }

    /**
     * POSTs the new actualValue to the backend, then refreshes
     * only #measurementsTable via HTMX (search bar is untouched).
     */
    function saveMeasurement(measurementId) {
        const input = document.getElementById('edit-input-' + measurementId);
        const newActualValue = parseFloat(input.value);

        if (isNaN(newActualValue) || newActualValue < 0) {
            input.classList.add('border-red-500', 'ring-2', 'ring-red-300');
            input.title = 'Value must be zero or positive';
            input.focus();
            return;
        }

        const actionsCell = document.getElementById('actions-cell-' + measurementId);
        actionsCell.innerHTML = `
            <span class="text-xs text-gray-400 flex items-center gap-1">
                <svg class="animate-spin h-3 w-3 text-blue-500" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                    <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                    <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
                </svg>
                Saving…
            </span>
        `;

        const formData = new FormData();
        formData.append('actualValue', newActualValue);

        fetch(`/kpi/measurements/${measurementId}/edit`, {
            method: 'POST',
            body: formData
        })
        .then(response => {
            if (!response.ok) {
                return response.text().then(text => { throw new Error(text || 'Save failed'); });
            }
            htmx.ajax('GET', '/fragments/kpi-measurements-table', {
                target: '#measurementsTable',
                swap: 'innerHTML'
            });
        })
        .catch(err => {
            console.error('Failed to update measurement:', err);
            actionsCell.innerHTML = `
                <span class="text-xs text-red-500 mr-1" title="${err.message}">Error</span>
                <button onclick="startEditMeasurement(${measurementId}, ${parseFloat(input.value)})"
                        class="text-blue-600 hover:text-blue-900 text-xs underline">Retry</button>
            `;
        });
    }

    /**
     * Cancels edit and refreshes table back to clean server state.
     */
    function cancelEditMeasurement(measurementId) {
        htmx.ajax('GET', '/fragments/kpi-measurements-table', {
            target: '#measurementsTable',
            swap: 'innerHTML'
        });
    }
</script>
</body>
</html>
