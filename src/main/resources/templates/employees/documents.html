<!DOCTYPE html>
<html xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:th="http://www.thymeleaf.org"
      layout:decorate="layouts/employeeLayout">
<head>
  <meta charset="UTF-8">
  <title>Document Center</title>
  <script>
    tailwind.config = {
        darkMode: "class",
        theme: {
            extend: {
                colors: {
                    primary: { 50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a' },
                },
                fontFamily: { 'sans': ['Inter', 'sans-serif'] },
            },
        },
    };
  </script>
  <style>
    * { font-family: 'Inter', sans-serif; }
    .badge-lg { padding: 0.6rem 1.5rem; font-size: 0.9rem; font-weight: 800; border-radius: 9999px; letter-spacing: 0.05em; text-transform: uppercase; display: inline-flex; align-items: center; }
    .badge-success { background-color: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }

    .document-card { background-color: white; border-radius: 1.25rem; border: 1px solid #e5e7eb; box-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1); }
    .dark .document-card { background-color: #1f2937; border-color: #374151; }

    .table-header { background-color: #f8fafc; color: #475569; }
    .dark .table-header { background-color: #111827; color: #9ca3af; }

    .action-btn {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        padding: 0.6rem 1.2rem;
        border-radius: 0.6rem;
        font-size: 0.875rem;
        font-weight: 600;
        transition: all 0.2s;
        border: 1px solid #e2e8f0;
    }
    .dark .action-btn { border-color: #374151; }
    .btn-view { background-color: #ffffff; color: #1e293b; }
    .btn-view:hover { background-color: #f1f5f9; border-color: #cbd5e1; }
    .btn-download { background-color: #2563eb; color: #ffffff; border-color: #2563eb; }
    .btn-download:hover { background-color: #1d4ed8; }
  </style>
</head>
<body>
<main layout:fragment="content" class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4"> <input type="hidden" id="currentEmployeeId" th:value="${employee.id}">

  <div class="mb-6 flex items-center space-x-4">
    <div class="w-12 h-12 bg-primary-600 rounded-xl flex items-center justify-center">
      <span class="material-icons-round text-white text-2xl">folder</span>
    </div>
    <div>
      <h3 class="text-xl font-black text-gray-900 dark:text-white tracking-tight">Document Center</h3>
    </div>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 gap-6 mb-8">
    <div class="document-card p-6 flex items-center justify-between border-l-4 border-l-primary-500">
      <p class="text-lg font-bold text-gray-700 dark:text-gray-300">Total Documents</p>
      <span id="statTotalDocs" class="text-5xl font-black text-primary-600 dark:text-primary-400">0</span>
    </div>

    <div class="document-card p-6 flex items-center justify-between">
      <p class="text-lg font-bold text-gray-700 dark:text-gray-300">Status</p>
      <span class="badge-lg badge-success">
        <span class="w-2 h-2 rounded-full bg-green-500 mr-2 animate-pulse"></span>
        Active
      </span>
    </div>
  </div>

  <div class="document-card overflow-hidden">
    <div class="px-8 py-5 border-b border-gray-100 dark:border-gray-700 flex items-center justify-between bg-white dark:bg-gray-800">
      <h4 class="text-base font-bold text-gray-800 dark:text-white uppercase tracking-wider">ALL DOCUMENTS</h4>
      <span id="tableCountDocs" class="text-sm font-bold text-primary-600 dark:text-primary-400">0 Documents Found</span>
    </div>

    <div class="overflow-x-auto">
      <table class="w-full">
        <thead>
        <tr class="table-header border-b border-gray-200 dark:border-gray-700">
          <th class="px-8 py-4 text-left text-xs font-bold uppercase tracking-widest">Document Name</th>
          <th class="px-8 py-4 text-center text-xs font-bold uppercase tracking-widest">Uploaded Date</th>
          <th class="px-8 py-4 text-right text-xs font-bold uppercase tracking-widest w-1/4"></th> </tr>
        </thead>
        <tbody id="documentTableBody" class="divide-y divide-gray-100 dark:divide-gray-700">
        </tbody>
      </table>
    </div>
  </div>

  <script th:inline="javascript">
    /*<![CDATA[*/
    document.addEventListener('DOMContentLoaded', function() {
        const employeeId = document.getElementById('currentEmployeeId').value;
        if (employeeId) {
            loadEmployeeDocuments(employeeId);
        }
    });

    function loadEmployeeDocuments(employeeId) {
        const tableBody = document.getElementById('documentTableBody');
        const statTotal = document.getElementById('statTotalDocs');
        const tableTotal = document.getElementById('tableCountDocs');

        tableBody.innerHTML = `<tr><td colspan="3" class="px-8 py-16 text-center text-gray-400 italic">Syncing files...</td></tr>`;

        fetch('/employees/' + employeeId + '/documents')
            .then(response => {
                if (!response.ok) throw new Error('Failed to load documents');
                return response.json();
            })
            .then(docs => {
                const count = docs ? docs.length : 0;
                statTotal.innerText = count;
                tableTotal.innerText = count + (count === 1 ? ' Document' : ' Documents');

                if (count === 0) {
                    tableBody.innerHTML = `<tr><td colspan="3" class="px-8 py-20 text-center text-gray-400 font-medium">No documents available.</td></tr>`;
                    return;
                }

                tableBody.innerHTML = docs.map(doc => {
                    const date = doc.uploadedAt ? new Date(doc.uploadedAt).toLocaleDateString('en-GB', {
                        day: '2-digit', month: 'short', year: 'numeric'
                    }) : 'N/A';

                    return `
                        <tr class="hover:bg-gray-50 dark:hover:bg-gray-800/50 transition-colors">
                            <td class="px-8 py-6">
                                <div class="flex items-center space-x-4">
                                    <span class="material-icons-round text-red-500">description</span>
                                    <span class="text-base font-bold text-gray-900 dark:text-white capitalize">${doc.documentName.toLowerCase()}</span>
                                </div>
                            </td>
                            <td class="px-8 py-6 text-sm text-gray-600 dark:text-gray-400 font-bold text-center italic">${date}</td>
                            <td class="px-8 py-6">
                                <div class="flex items-center justify-end space-x-3">
                                    <a href="/documents/view/${doc.id}" target="_blank" class="action-btn btn-view">
                                        <span class="material-icons-round text-lg">visibility</span>
                                        <span>View</span>
                                    </a>
                                    <a href="/documents/download/${doc.id}" class="action-btn btn-download shadow-sm">
                                        <span class="material-icons-round text-lg">download</span>
                                        <span>Download</span>
                                    </a>
                                </div>
                            </td>
                        </tr>
                    `;
                }).join('');
            })
            .catch(error => {
                console.error('Error:', error);
                tableBody.innerHTML = `<tr><td colspan="3" class="px-8 py-16 text-center text-red-500 font-bold">Connection error. Please refresh.</td></tr>`;
            });
    }
    /*]]>*/
  </script>
</main>
</body>
</html>
