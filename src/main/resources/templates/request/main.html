<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>Requests</title>
    <style>
        .request-page { --request-border:#e5e7eb; --request-muted:#64748b; --request-surface:#ffffff; --request-soft:#f8fafc; }
        .dark .request-page { --request-border:#374151; --request-muted:#9ca3af; --request-surface:#1f2937; --request-soft:#111827; }
        .request-hero { border:1px solid var(--request-border); background:linear-gradient(135deg,#fff 0%,#eff6ff 100%); border-radius:16px; padding:24px; box-shadow:0 16px 40px -28px rgba(15,23,42,.45); }
        .dark .request-hero { background:linear-gradient(135deg,#1f2937 0%,#0f172a 100%); }
        .request-card { border:1px solid var(--request-border); background:var(--request-surface); border-radius:14px; box-shadow:0 12px 28px -24px rgba(15,23,42,.5); }
        .request-metric { border:1px solid var(--request-border); background:var(--request-surface); border-radius:14px; padding:18px; min-height:112px; display:flex; justify-content:space-between; gap:16px; }
        .request-icon { width:40px; height:40px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; }
        .request-control { width:100%; border:1px solid var(--request-border); background:var(--request-surface); border-radius:10px; padding:10px 12px; font-size:14px; outline:none; transition:border-color .15s ease, box-shadow .15s ease; }
        .request-control:focus { border-color:#2563eb; box-shadow:0 0 0 3px rgba(37,99,235,.12); }
        .request-toolbar { display:grid; gap:12px; padding:16px; border-bottom:1px solid var(--request-border); background:var(--request-soft); }
        .request-table-head { background:var(--request-soft); color:var(--request-muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
        .request-row { transition:background-color .15s ease; }
        .request-row:hover { background:#f8fafc; }
        .dark .request-row:hover { background:#111827; }
        .request-badge { display:inline-flex; align-items:center; border-radius:999px; padding:4px 10px; font-size:11px; font-weight:700; text-transform:uppercase; white-space:nowrap; }
        .request-badge-success { background:#dcfce7; color:#166534; }
        .request-badge-error { background:#fee2e2; color:#991b1b; }
        .request-badge-warning { background:#fef3c7; color:#92400e; }
        .request-badge-info { background:#dbeafe; color:#1e40af; }
        .request-badge-neutral { background:#f1f5f9; color:#475569; }
        .dark .request-badge-neutral { background:#374151; color:#d1d5db; }
        .request-primary-btn { display:inline-flex; align-items:center; gap:8px; border-radius:10px; background:#2563eb; color:#fff; padding:10px 16px; font-size:14px; font-weight:700; transition:background-color .15s ease, transform .15s ease; }
        .request-primary-btn:hover { background:#1d4ed8; transform:translateY(-1px); }
        .request-secondary-btn { display:inline-flex; align-items:center; gap:8px; border:1px solid var(--request-border); border-radius:10px; padding:10px 16px; font-size:14px; font-weight:700; background:var(--request-surface); }
        .request-type-panel { border:1px solid var(--request-border); background:var(--request-soft); border-radius:14px; padding:18px; }
        .request-line-row { border:1px solid var(--request-border); background:var(--request-surface); border-radius:12px; padding:12px; }
        .request-empty { padding:28px; text-align:center; color:var(--request-muted); }
    </style>
</head>
<body>
<main layout:fragment="content" class="request-page space-y-6">
    <div class="request-hero flex flex-col gap-4 lg:flex-row lg:items-center lg:justify-between">
        <div class="flex items-start gap-4">
            <span class="request-icon bg-primary-100 text-primary-700 dark:bg-primary-900 dark:text-primary-200">
                <span class="material-icons-round">assignment</span>
            </span>
            <div>
                <h1 class="text-2xl font-bold tracking-tight text-gray-900 dark:text-gray-100">Requests</h1>
                <p class="mt-1 max-w-2xl text-sm text-gray-600 dark:text-gray-300">Track organizational requests from one workflow desk.</p>
            </div>
        </div>
        <div class="flex flex-wrap gap-2">
            <a href="/requests/userGuide" class="request-secondary-btn">
                <span class="material-icons-round text-base">help</span>
                User Guide
            </a>
        </div>
    </div>

    <section class="grid grid-cols-1 gap-4 md:grid-cols-3">
        <div class="request-metric">
            <div><p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Open</p><p id="openCount" class="mt-3 text-3xl font-bold">0</p></div>
            <span class="request-icon bg-blue-50 text-blue-600"><span class="material-icons-round">pending_actions</span></span>
        </div>
        <div class="request-metric">
            <div><p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Approved</p><p id="approvedCount" class="mt-3 text-3xl font-bold">0</p></div>
            <span class="request-icon bg-green-50 text-green-600"><span class="material-icons-round">task_alt</span></span>
        </div>
        <div class="request-metric">
            <div><p class="text-xs font-semibold uppercase tracking-wide text-gray-500">Returned or Rejected</p><p id="exceptionCount" class="mt-3 text-3xl font-bold">0</p></div>
            <span class="request-icon bg-red-50 text-red-600"><span class="material-icons-round">report</span></span>
        </div>
    </section>

    <section class="request-card overflow-hidden">
        <div class="request-toolbar md:grid-cols-[1fr_180px_180px_180px]">
            <input id="requestSearch" placeholder="Search number or title" class="request-control">
            <select id="typeFilter" class="request-control">
                <option value="">All types</option>
            </select>
            <select id="statusFilter" class="request-control">
                <option value="">All statuses</option>
                <option>DRAFT</option>
                <option>IN_APPROVAL</option>
                <option>RETURNED_FOR_CORRECTION</option>
                <option>APPROVED</option>
                <option>REJECTED</option>
                <option>CANCELLED</option>
                <option>CLOSED</option>
            </select>
            <select id="priorityFilter" class="request-control">
                <option value="">All priorities</option>
                <option>LOW</option>
                <option>NORMAL</option>
                <option>HIGH</option>
                <option>URGENT</option>
            </select>
        </div>
        <div class="overflow-x-auto">
            <table class="w-full min-w-[820px] text-sm">
                <thead class="request-table-head">
                <tr>
                    <th class="px-4 py-3 text-left">Number</th>
                    <th class="px-4 py-3 text-left">Title</th>
                    <th class="px-4 py-3 text-left">Type</th>
                    <th class="px-4 py-3 text-left">Priority</th>
                    <th class="px-4 py-3 text-left">Status</th>
                    <th class="px-4 py-3 text-left">Action</th>
                </tr>
                </thead>
                <tbody id="requestRows" class="divide-y divide-gray-200 dark:divide-gray-700"></tbody>
            </table>
        </div>
    </section>

    <section class="request-card overflow-hidden">
        <div class="flex items-center justify-between border-b border-gray-200 p-4 dark:border-gray-700">
            <h2 class="text-base font-semibold">Approval Paths</h2>
            <button type="button" onclick="loadData()" class="request-secondary-btn px-3 py-1.5 text-xs"><span class="material-icons-round text-sm">refresh</span>Refresh</button>
        </div>
        <div class="grid grid-cols-1 gap-4 p-4 xl:grid-cols-[1fr_1fr]">
            <form id="approvalPathForm" class="request-type-panel space-y-3">
                <h3 class="font-semibold">Custom Path</h3>
                <input id="approvalPathId" type="hidden">
                <input id="approvalPathName" class="request-control" placeholder="Path name" required>
                <textarea id="approvalPathDescription" class="request-control" rows="2" placeholder="Description"></textarea>
                <label class="inline-flex items-center gap-2 text-sm"><input id="approvalPathEnabled" type="checkbox" checked> Enabled</label>
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium">Approvers</span>
                    <button type="button" onclick="addApprovalStepRow()" class="request-secondary-btn px-3 py-1.5 text-xs">Add Approver</button>
                </div>
                <div id="approvalStepRows" class="space-y-2"></div>
                <div class="flex justify-end gap-2">
                    <button type="button" onclick="resetApprovalPathForm()" class="request-secondary-btn">Clear</button>
                    <button type="submit" class="request-primary-btn">Save Path</button>
                </div>
            </form>
            <div class="space-y-4">
                <div class="request-type-panel">
                    <h3 class="mb-3 font-semibold">Request Type Routing</h3>
                    <div id="requestTypeRouteRows" class="space-y-2"></div>
                </div>
                <div class="request-type-panel">
                    <h3 class="mb-3 font-semibold">Saved Paths</h3>
                    <div id="approvalPathRows" class="space-y-2"></div>
                </div>
            </div>
        </div>
    </section>

    <script>
        const api = '/api/requests';
        let requests = [];
        let types = [];
        let approvalPaths = [];
        let approverOptions = [];

        function showError(message) { alert(message || 'Request failed'); }
        function fmtType(type) { return (type || '').replaceAll('_', ' '); }
        function badge(status) {
            const color = status === 'APPROVED' ? 'request-badge-success' :
                status === 'REJECTED' || status === 'CANCELLED' ? 'request-badge-error' :
                    status === 'RETURNED_FOR_CORRECTION' ? 'request-badge-warning' :
                        status === 'IN_APPROVAL' ? 'request-badge-info' : 'request-badge-neutral';
            return `<span class="request-badge ${color}">${fmtType(status)}</span>`;
        }

     async function json(url, options) {
    const response = await fetch(url, options);
    if (!response.ok) throw new Error(await response.text());
    const contentType = response.headers.get('content-type') || '';
    if (!contentType.includes('application/json')) return [];
    const data = await response.json();
    return data === null ? [] : data;
}

        async function loadData() {
            try {
                [requests, types, approvalPaths, approverOptions] = await Promise.all([
                    json(api + '/visible'),
                    json(api + '/types'),
                    json('/api/approval-paths'),
                    json('/api/approval-paths/approvers')
                ]);
                requests = requests || [];
                types = types || [];
                approvalPaths = approvalPaths || [];
                approverOptions = approverOptions || [];
                renderTypeOptions();
                renderApprovalPathRows();
                renderRequestTypeRoutes();
                if (!document.querySelectorAll('[data-approval-step]').length) resetApprovalPathForm();
                renderRequests();
                renderStats();
            } catch (e) {
                showError(e.message);
            }
        }

        function renderTypeOptions() {
            const options = types.map(t => `<option value="${t.code}">${t.name}</option>`).join('');
            document.getElementById('typeFilter').innerHTML = '<option value="">All types</option>' + options;
        }

        function renderApprovalPathRows() {
            const body = document.getElementById('approvalPathRows');
            body.innerHTML = approvalPaths.length ? approvalPaths.map(path => `
                <div class="request-line-row flex flex-col gap-2 md:flex-row md:items-center md:justify-between">
                    <div>
                        <p class="font-semibold">${path.name}</p>
                        <p class="text-xs text-gray-500">${path.enabled ? 'Enabled' : 'Disabled'} - ${(path.steps || []).length} approver(s)</p>
                    </div>
                    <div class="flex flex-wrap gap-2">
                        <button type="button" onclick="editApprovalPath(${path.id})" class="request-secondary-btn px-3 py-1.5 text-xs">Edit</button>
                        <button type="button" onclick="toggleApprovalPath(${path.id}, ${!path.enabled})" class="request-secondary-btn px-3 py-1.5 text-xs">${path.enabled ? 'Disable' : 'Enable'}</button>
                    </div>
                </div>`).join('') : '<div class="request-empty">No custom approval paths configured.</div>';
        }

        function renderRequestTypeRoutes() {
            const body = document.getElementById('requestTypeRouteRows');
            body.innerHTML = types.length ? types.map(type => `
                <div class="request-line-row grid grid-cols-1 gap-2 lg:grid-cols-[1fr_160px_1fr_auto]">
                    <div>
                        <p class="font-semibold">${type.name}</p>
                        <p class="text-xs text-gray-500">${type.code}</p>
                    </div>
                    <select data-route-type="${type.code}" class="request-control" onchange="syncRoutePathState('${type.code}')">
                        <option value="LINE_MANAGER" ${type.approvalRouteType !== 'CUSTOM' ? 'selected' : ''}>Line Manager</option>
                        <option value="CUSTOM" ${type.approvalRouteType === 'CUSTOM' ? 'selected' : ''}>Custom</option>
                    </select>
                    <select data-route-path="${type.code}" class="request-control">
                        <option value="">Select custom path</option>
                        ${approvalPaths.filter(path => path.enabled).map(path => `<option value="${path.id}" ${type.customApprovalPathId === path.id ? 'selected' : ''}>${path.name}</option>`).join('')}
                    </select>
                    <button type="button" onclick="saveRequestTypeRoute('${type.code}')" class="request-primary-btn justify-center">Save</button>
                </div>`).join('') : '<div class="request-empty">No request types configured.</div>';
            types.forEach(type => syncRoutePathState(type.code));
        }

        function syncRoutePathState(code) {
            const routeType = document.querySelector(`[data-route-type="${code}"]`).value;
            const path = document.querySelector(`[data-route-path="${code}"]`);
            path.disabled = routeType !== 'CUSTOM';
        }

        function addApprovalStepRow(value = '') {
            const row = document.createElement('div');
            row.className = 'grid grid-cols-[1fr_auto] gap-2';
            row.innerHTML = `
                <select data-approval-step class="request-control" required>
                    <option value="">Select approver</option>
                    ${approverOptions.map(option => `<option value="${option.value}" ${String(option.value) === String(value) ? 'selected' : ''}>${option.label}</option>`).join('')}
                </select>
                <button type="button" onclick="this.closest('div').remove()" class="request-secondary-btn px-3">Remove</button>`;
            document.getElementById('approvalStepRows').appendChild(row);
        }

        function editApprovalPath(id) {
            const path = approvalPaths.find(item => item.id === id);
            if (!path) return;
            document.getElementById('approvalPathId').value = path.id;
            document.getElementById('approvalPathName').value = path.name || '';
            document.getElementById('approvalPathDescription').value = path.description || '';
            document.getElementById('approvalPathEnabled').checked = !!path.enabled;
            document.getElementById('approvalStepRows').innerHTML = '';
            (path.steps || []).forEach(step => addApprovalStepRow(step.approverEmployeeId));
        }

        function resetApprovalPathForm() {
            document.getElementById('approvalPathForm').reset();
            document.getElementById('approvalPathId').value = '';
            document.getElementById('approvalPathEnabled').checked = true;
            document.getElementById('approvalStepRows').innerHTML = '';
            addApprovalStepRow();
        }

        async function toggleApprovalPath(id, enabled) {
            try {
                await json(`/api/approval-paths/${id}/${enabled ? 'enable' : 'disable'}`, {method:'POST'});
                await loadData();
            } catch (e) { showError(e.message); }
        }

        async function saveRequestTypeRoute(code) {
            const routeType = document.querySelector(`[data-route-type="${code}"]`).value;
            const pathId = document.querySelector(`[data-route-path="${code}"]`).value;
            if (routeType === 'CUSTOM' && !pathId) return showError('Select a custom approval path.');
            try {
                await json(`/api/approval-paths/request-types/${code}`, {
                    method:'PUT',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({approvalRouteType: routeType, customApprovalPathId: pathId ? Number(pathId) : null})
                });
                await loadData();
            } catch (e) { showError(e.message); }
        }

        document.getElementById('approvalPathForm').addEventListener('submit', async event => {
            event.preventDefault();
            const id = document.getElementById('approvalPathId').value;
            const steps = [...document.querySelectorAll('[data-approval-step]')]
                .map(select => Number(select.value))
                .filter(value => value);
            if (!steps.length) return showError('Add at least one approver.');
            try {
                await json(id ? `/api/approval-paths/${id}` : '/api/approval-paths', {
                    method: id ? 'PUT' : 'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({
                        name: document.getElementById('approvalPathName').value,
                        description: document.getElementById('approvalPathDescription').value,
                        enabled: document.getElementById('approvalPathEnabled').checked,
                        steps: steps.map(approverEmployeeId => ({approverEmployeeId}))
                    })
                });
                resetApprovalPathForm();
                await loadData();
            } catch (e) { showError(e.message); }
        });

        function renderRequests() {
            const type = document.getElementById('typeFilter').value;
            const status = document.getElementById('statusFilter').value;
            const priority = document.getElementById('priorityFilter').value;
            const search = document.getElementById('requestSearch').value.toLowerCase();
            const filtered = requests.filter(r =>
                (!type || r.requestType === type) &&
                (!status || r.status === status) &&
                (!priority || r.priority === priority) &&
                (!search || (r.requestNumber || '').toLowerCase().includes(search) || (r.title || '').toLowerCase().includes(search))
            );
            const body = document.getElementById('requestRows');
            body.innerHTML = filtered.length ? filtered.map(r => `
                <tr class="request-row">
                    <td class="px-4 py-3">${r.requestNumber || ''}</td>
                    <td class="px-4 py-3">${r.title || ''}</td>
                    <td class="px-4 py-3">${fmtType(r.requestType)}</td>
                    <td class="px-4 py-3">${r.priority || ''}</td>
                    <td class="px-4 py-3">${badge(r.status)}</td>
                    <td class="px-4 py-3"><a class="text-primary-600 hover:underline" href="/requests/${r.id}">Open</a></td>
                </tr>`).join('') : '<tr><td colspan="6"><div class="request-empty"><span class="material-icons-round mb-2 block text-3xl">inbox</span>No requests found.</div></td></tr>';
        }

        function renderStats() {
            document.getElementById('openCount').textContent = requests.filter(r => ['DRAFT','SUBMITTED','IN_APPROVAL','RETURNED_FOR_CORRECTION'].includes(r.status)).length;
            document.getElementById('approvedCount').textContent = requests.filter(r => r.status === 'APPROVED').length;
            document.getElementById('exceptionCount').textContent = requests.filter(r => ['RETURNED_FOR_CORRECTION','REJECTED'].includes(r.status)).length;
        }

        ['typeFilter','statusFilter','priorityFilter','requestSearch'].forEach(id => document.getElementById(id).addEventListener('input', renderRequests));
        document.addEventListener('DOMContentLoaded', loadData);
    </script>
</main>
</body>
</html>
