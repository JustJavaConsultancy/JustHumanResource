<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layouts/employeeLayout}">
<head>
    <meta charset="UTF-8">
    <title>Request Detail</title>
    <style>
        .request-page { --request-border:#e5e7eb; --request-muted:#64748b; --request-surface:#ffffff; --request-soft:#f8fafc; }
        .dark .request-page { --request-border:#374151; --request-muted:#9ca3af; --request-surface:#1f2937; --request-soft:#111827; }
        .request-hero { border:1px solid var(--request-border); background:linear-gradient(135deg,#fff 0%,#eff6ff 100%); border-radius:16px; padding:24px; box-shadow:0 16px 40px -28px rgba(15,23,42,.45); }
        .dark .request-hero { background:linear-gradient(135deg,#1f2937 0%,#0f172a 100%); }
        .request-card { border:1px solid var(--request-border); background:var(--request-surface); border-radius:14px; box-shadow:0 12px 28px -24px rgba(15,23,42,.5); }
        .request-card-head { display:flex; align-items:center; gap:10px; border-bottom:1px solid var(--request-border); padding:16px 20px; }
        .request-icon { width:38px; height:38px; border-radius:12px; display:inline-flex; align-items:center; justify-content:center; }
        .request-control { width:100%; border:1px solid var(--request-border); background:var(--request-surface); border-radius:10px; padding:10px 12px; font-size:14px; outline:none; }
        .request-table-head { background:var(--request-soft); color:var(--request-muted); font-size:11px; text-transform:uppercase; letter-spacing:.04em; }
        .request-kv { display:grid; grid-template-columns:minmax(140px,220px) 1fr; gap:10px 18px; }
        .request-kv b { color:var(--request-muted); font-size:12px; text-transform:uppercase; letter-spacing:.04em; }
        .request-timeline-item { border:1px solid var(--request-border); background:var(--request-soft); border-radius:12px; padding:12px; }
        .request-primary-btn { display:inline-flex; align-items:center; gap:8px; border-radius:10px; background:#2563eb; color:#fff; padding:10px 16px; font-size:14px; font-weight:700; }
        .request-secondary-btn { display:inline-flex; align-items:center; gap:8px; border:1px solid var(--request-border); border-radius:10px; padding:10px 16px; font-size:14px; font-weight:700; background:var(--request-surface); }
        .request-danger-btn { display:inline-flex; align-items:center; gap:8px; border:1px solid #fecaca; border-radius:10px; padding:10px 16px; color:#b91c1c; font-size:14px; font-weight:700; background:#fff; }
        .request-success-btn { display:inline-flex; align-items:center; gap:8px; border-radius:10px; background:#16a34a; color:white; padding:10px 16px; font-size:14px; font-weight:700; }
        .request-warning-btn { display:inline-flex; align-items:center; gap:8px; border-radius:10px; background:#d97706; color:white; padding:10px 16px; font-size:14px; font-weight:700; }
    </style>
</head>
<body>
<main layout:fragment="content" class="request-page space-y-6">
    <div class="request-hero flex flex-col gap-4 md:flex-row md:items-center md:justify-between">
        <div class="flex items-start gap-4">
            <span class="request-icon bg-primary-100 text-primary-700 dark:bg-primary-900 dark:text-primary-200"><span class="material-icons-round">article</span></span>
            <div>
            <a href="/employee/requests" class="text-sm text-primary-600 hover:underline">Back to Requests</a>
            <h1 id="requestTitle" class="mt-2 text-2xl font-bold tracking-tight text-gray-900 dark:text-gray-100">Request</h1>
            <p id="requestMeta" class="text-sm text-gray-500 dark:text-gray-400"></p>
            </div>
        </div>
        <div id="primaryActions" class="flex flex-wrap gap-2"></div>
    </div>

    <section class="grid grid-cols-1 gap-6 xl:grid-cols-3">
        <div class="space-y-6 xl:col-span-2">
            <div class="request-card">
                <div class="request-card-head"><span class="material-icons-round text-primary-600">summarize</span><h2 class="text-base font-semibold">Summary</h2></div>
                <div id="summary" class="request-kv p-5 text-sm"></div>
            </div>

            <div class="request-card">
                <div class="request-card-head"><span class="material-icons-round text-primary-600">category</span><h2 class="text-base font-semibold">Type Details</h2></div>
                <div id="typeDetails" class="p-5 text-sm"></div>
            </div>

            <div class="request-card">
                <div class="request-card-head"><span class="material-icons-round text-primary-600">inventory_2</span><h2 class="text-base font-semibold">Items</h2></div>
                <div id="items" class="overflow-x-auto p-5"></div>
            </div>

            <div class="request-card">
                <div class="request-card-head"><span class="material-icons-round text-primary-600">attach_file</span><h2 class="text-base font-semibold">Attachments</h2></div>
                <form id="attachmentForm" class="flex flex-col gap-3 p-5 md:flex-row md:items-center">
                    <input id="attachmentFile" type="file" class="text-sm">
                    <select id="attachmentType" class="request-control md:w-56">
                        <option>SUPPORTING_DOCUMENT</option>
                        <option>RECEIPT</option>
                        <option>QUOTE</option>
                        <option>APPROVAL_DOCUMENT</option>
                        <option>POLICY_DOCUMENT</option>
                        <option>IDENTIFICATION</option>
                        <option>OTHER</option>
                    </select>
                    <button class="request-primary-btn">Upload</button>
                </form>
                <div id="attachments" class="px-5 pb-5 text-sm"></div>
            </div>
        </div>

        <aside class="space-y-6">
            <div class="request-card p-5">
                <h2 class="flex items-center gap-2 text-base font-semibold"><span class="material-icons-round text-primary-600">timeline</span>Approval Timeline</h2>
                <ol id="approvalSteps" class="mt-4 space-y-3 text-sm"></ol>
            </div>

            <div class="request-card p-5">
                <h2 class="flex items-center gap-2 text-base font-semibold"><span class="material-icons-round text-primary-600">comment</span>Comments</h2>
                <form id="commentForm" class="mt-4 space-y-3">
                    <textarea id="commentText" rows="3" placeholder="Add a comment" class="request-control"></textarea>
                    <label class="inline-flex items-center gap-2 text-sm"><input id="internalComment" type="checkbox"> Internal only</label>
                    <button class="request-primary-btn">Add Comment</button>
                </form>
                <ul id="comments" class="mt-4 space-y-3 text-sm"></ul>
            </div>

            <div class="request-card p-5">
                <h2 class="flex items-center gap-2 text-base font-semibold"><span class="material-icons-round text-primary-600">history</span>Activity</h2>
                <ul id="activity" class="mt-4 space-y-3 text-sm"></ul>
            </div>
        </aside>
    </section>

    <script>
        const api = '/api/requests';
        const pageBase = '/employee/requests';
        const requestId = Number(location.pathname.split('/').pop());
        let detail = null;
        let context = null;
        let tasks = [];

        function text(value) { return value == null || value === '' ? '-' : value; }
        function fmt(value) { return (value || '').replaceAll('_', ' '); }
        function isOwner() { return detail && context && detail.request.requesterEmployeeId === context.employeeId; }
        function canEditAttachments() { return isOwner() && ['DRAFT','SUBMITTED','RETURNED_FOR_CORRECTION'].includes(detail.request.status); }
        function canRemoveAttachments() { return isOwner() && ['DRAFT','RETURNED_FOR_CORRECTION'].includes(detail.request.status); }

        async function json(url, options) {
            const response = await fetch(url, options);
            if (!response.ok) throw new Error(await response.text());
            const contentType = response.headers.get('content-type') || '';
            return contentType.includes('application/json') ? response.json() : null;
        }

        async function load() {
            try {
                [detail, context, tasks] = await Promise.all([
                    json(`${api}/${requestId}`),
                    json(`${api}/context`),
                    json(`${api}/approvals/tasks`)
                ]);
                render();
            } catch (e) {
                document.querySelector('main').innerHTML = `<div class="rounded-lg border border-red-200 bg-red-50 p-4 text-red-700">${e.message}</div>`;
            }
        }

        function render() {
            const r = detail.request;
            document.getElementById('requestTitle').textContent = `${r.requestNumber}: ${r.title}`;
            document.getElementById('requestMeta').textContent = `${fmt(r.requestType)} | ${r.priority} | ${fmt(r.status)}`;
            document.getElementById('summary').innerHTML = `
                <b>Description</b><span>${text(r.description)}</span>
                <b>Requester employee ID</b><span>${r.requesterEmployeeId}</span>
                <b>Department ID</b><span>${text(r.departmentId)}</span>
                <b>Submitted</b><span>${text(r.submittedAt)}</span>`;
            renderTypeDetails();
            renderItems();
            renderAttachments();
            renderApprovals();
            renderComments();
            renderActivity();
            renderActions();
            document.getElementById('attachmentForm').classList.toggle('hidden', !canEditAttachments());
            document.getElementById('internalComment').closest('label').classList.toggle('hidden', !context.hrAdmin);
        }

        function renderTypeDetails() {
            const d = detail.typeDetails;
            if (!d) {
                document.getElementById('typeDetails').innerHTML = '<p class="text-gray-500">No additional details.</p>';
                return;
            }
            if (detail.request.requestType === 'EXPENSE_REIMBURSEMENT') {
                const rows = d.expenseItems || [];
                document.getElementById('typeDetails').innerHTML = `
                    <div class="space-y-2">
                        ${Object.entries(d).filter(([key]) => key !== 'expenseItems').map(([key, value]) => `<p><b>${fmt(key)}:</b> ${text(value)}</p>`).join('')}
                        <div class="overflow-x-auto">
                            <table class="w-full text-sm">
                                <thead class="request-table-head"><tr><th class="px-3 py-2 text-left">Date</th><th class="px-3 py-2 text-left">Category</th><th class="px-3 py-2 text-left">Description</th><th class="px-3 py-2 text-left">Vendor</th><th class="px-3 py-2 text-left">Amount</th><th class="px-3 py-2 text-left">Remarks</th></tr></thead>
                                <tbody>${rows.map(x => `<tr><td class="px-3 py-2">${text(x.expenseDate)}</td><td class="px-3 py-2">${text(x.expenseCategoryLabel)}</td><td class="px-3 py-2">${text(x.description)}</td><td class="px-3 py-2">${text(x.vendorName)}</td><td class="px-3 py-2">${text(x.amount)} ${text(x.currency)}</td><td class="px-3 py-2">${text(x.remarks)}</td></tr>`).join('')}</tbody>
                            </table>
                        </div>
                    </div>`;
                return;
            }
            document.getElementById('typeDetails').innerHTML = Object.entries(d)
                .filter(([key]) => !['id','createdAt','updatedAt','version','workflowRequestId'].includes(key))
                .map(([key, value]) => `<p><b>${fmt(key)}:</b> ${text(value)}</p>`)
                .join('');
        }

        function renderItems() {
            const rows = detail.items || [];
            document.getElementById('items').innerHTML = rows.length ? `
                <table class="w-full text-sm">
                    <thead class="request-table-head"><tr><th class="px-3 py-2 text-left">Item</th><th class="px-3 py-2 text-left">FAM Code</th><th class="px-3 py-2 text-left">Qty</th><th class="px-3 py-2 text-left">Source</th><th class="px-3 py-2 text-left">Unit Cost</th><th class="px-3 py-2 text-left">Total</th></tr></thead>
                    <tbody>${rows.map(x => `<tr><td class="px-3 py-2">${x.itemName}</td><td class="px-3 py-2">${text(x.externalAssetCode)}</td><td class="px-3 py-2">${x.quantity} ${text(x.unitOfMeasure)}</td><td class="px-3 py-2">${text(x.externalSourceSystem)} ${text(x.externalAssetId)}</td><td class="px-3 py-2">${text(x.estimatedUnitCost)} ${text(x.currency)}</td><td class="px-3 py-2">${text(x.estimatedTotalCost)} ${text(x.currency)}</td></tr>`).join('')}</tbody>
                </table>` : '<p class="text-gray-500">No items.</p>';
        }

        function renderAttachments() {
            const rows = detail.attachments || [];
            document.getElementById('attachments').innerHTML = rows.length ? rows.map(a => `
                <div class="flex items-center justify-between border-b border-gray-100 py-2 dark:border-gray-700">
                    <a class="text-primary-600 hover:underline" href="${api}/${requestId}/attachments/${a.id}">${a.originalFilename}</a>
                    ${canRemoveAttachments() ? `<button onclick="removeAttachment(${a.id})" class="rounded border border-red-300 px-2 py-1 text-xs text-red-600">Remove</button>` : ''}
                </div>`).join('') : '<p class="text-gray-500">No attachments.</p>';
        }

        function renderApprovals() {
            const rows = detail.approvalSteps || [];
            document.getElementById('approvalSteps').innerHTML = rows.length ? rows.map(s => `
                <li class="request-timeline-item">
                    <p><b>Level ${s.sequenceNo}</b> - ${fmt(s.decision)}</p>
                    <p>Approver employee ID: ${s.approverEmployeeId}</p>
                    <p>${text(s.comments)}</p>
                </li>`).join('') : '<li class="text-gray-500">Not submitted.</li>';
        }

        function renderComments() {
            const rows = detail.comments || [];
            document.getElementById('comments').innerHTML = rows.length ? rows.map(c => `<li class="rounded border border-gray-200 p-3 dark:border-gray-700">${c.comment}</li>`).join('') : '<li class="text-gray-500">No comments.</li>';
        }

        function renderActivity() {
            const rows = detail.activities || [];
            document.getElementById('activity').innerHTML = rows.length ? rows.map(a => `<li><b>${fmt(a.activityType)}</b><br>${text(a.description)}</li>`).join('') : '<li class="text-gray-500">No activity.</li>';
        }

        function renderActions() {
            const r = detail.request;
            const task = tasks.find(t => t.variables && Number(t.variables.workflowRequestId) === requestId);
            const actions = [];
            if (isOwner() && ['DRAFT','RETURNED_FOR_CORRECTION'].includes(r.status)) actions.push(`<button onclick="submitRequest()" class="request-primary-btn">Submit</button>`);
            if (isOwner() && !['APPROVED','REJECTED','CANCELLED','CLOSED'].includes(r.status)) actions.push(`<button onclick="cancelRequest()" class="request-danger-btn">Cancel</button>`);
            if (context.hrAdmin && r.status === 'APPROVED') actions.push(`<button onclick="closeRequest()" class="request-secondary-btn">Close</button>`);
            if (task) {
                actions.push(`<button onclick="approval('${task.taskId}','approve')" class="request-success-btn">Approve</button>`);
                actions.push(`<button onclick="approval('${task.taskId}','reject')" class="request-danger-btn">Reject</button>`);
                actions.push(`<button onclick="approval('${task.taskId}','return')" class="request-warning-btn">Return</button>`);
            }
            document.getElementById('primaryActions').innerHTML = actions.join('');
        }

        async function submitRequest() { await mutate(`${api}/${requestId}/submit`, 'POST'); }
        async function cancelRequest() { if (confirm('Cancel this request?')) await mutate(`${api}/${requestId}/cancel`, 'POST'); }
        async function closeRequest() { if (confirm('Close this request?')) await mutate(`${api}/${requestId}/close`, 'POST'); }
        async function mutate(url, method) {
            try { await json(url, {method}); await load(); } catch (e) { alert(e.message); }
        }

        async function approval(taskId, action) {
            const comment = prompt(action === 'approve' ? 'Optional comment:' : 'Comment is required:') || '';
            if (action !== 'approve' && !comment.trim()) return alert('A comment is required.');
            try {
                await json(`${api}/approvals/${action}`, {method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({taskId, comment})});
                await load();
            } catch (e) { alert(e.message); }
        }

        async function removeAttachment(id) {
            if (!confirm('Remove this attachment?')) return;
            try {
                const response = await fetch(`${api}/${requestId}/attachments/${id}`, {method:'DELETE'});
                if (!response.ok) throw new Error(await response.text());
                await load();
            } catch (e) { alert(e.message); }
        }

        document.getElementById('attachmentForm').addEventListener('submit', async event => {
            event.preventDefault();
            const file = document.getElementById('attachmentFile').files[0];
            if (!file) return alert('Choose a file to upload.');
            const form = new FormData();
            form.append('file', file);
            form.append('attachmentType', document.getElementById('attachmentType').value);
            try {
                const response = await fetch(`${api}/${requestId}/attachments`, {method:'POST', body: form});
                if (!response.ok) throw new Error(await response.text());
                event.target.reset();
                await load();
            } catch (e) { alert(e.message); }
        });

        document.getElementById('commentForm').addEventListener('submit', async event => {
            event.preventDefault();
            try {
                await json(`${api}/${requestId}/comments`, {
                    method:'POST',
                    headers:{'Content-Type':'application/json'},
                    body: JSON.stringify({comment: document.getElementById('commentText').value, internalOnly: document.getElementById('internalComment').checked})
                });
                event.target.reset();
                await load();
            } catch (e) { alert(e.message); }
        });

        document.addEventListener('DOMContentLoaded', load);
    </script>
</main>
</body>
</html>
