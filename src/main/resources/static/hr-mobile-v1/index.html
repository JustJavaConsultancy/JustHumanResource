<!doctype html>
<html>
<head>

<meta charset="utf-8" />
<meta name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />

<title>JustHumanResource</title>

<style>

html, body {
  margin:0;
  padding:0;
  width:100%;
  height:100%;
  background:#ffffff;
  overflow:hidden;
  font-family:system-ui,-apple-system,BlinkMacSystemFont,sans-serif;
}

#loading{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:16px;
  font-weight:500;
  color:#333;
}

</style>

</head>

<body>

<div id="loading">Starting JustHumanResource…</div>

<script src="cordova.js"></script>

<script>

const BACKEND_BASE_URL = "https://justhumanresource-copy-1-production.up.railway.app";
const STORAGE_NAMESPACE = "justhr_mobile_auth";

document.addEventListener("deviceready", onDeviceReady, false);

function onDeviceReady(){

    console.log("Cordova device ready");

    const loader = document.getElementById("loading");
    loader.innerText = "Checking biometric authentication...";

    startBiometricCheck();

}

function startBiometricCheck(){

    if(!window.Fingerprint){

        console.log("Fingerprint plugin not available");
        launchKeycloakLogin();
        return;

    }

    Fingerprint.isAvailable(

        function(type){

            console.log("Biometric available:", type);

            showBiometricPrompt();

        },

        function(error){

            console.log("Biometric not supported:", error);

            launchKeycloakLogin();

        }

    );

}

function showBiometricPrompt(){

    Fingerprint.show(

        {
            title:"JustHumanResource",
            subtitle:"Employee Authentication",
            description:"Use fingerprint or face to unlock",
            cancelButtonTitle:"Cancel"
        },

        function(){

            console.log("Biometric authentication successful");
            attemptRefreshLogin();

        },

        function(error){

            console.log("Authentication failed:", error);

            alert("Biometric authentication failed.");

        }

    );

}

function getSecureStorage(){
    return new Promise((resolve, reject) => {
        if (!window.SecureStorage) {
            reject(new Error("SecureStorage plugin not available"));
            return;
        }
        const storage = new SecureStorage(
            () => resolve(storage),
            err => reject(err),
            STORAGE_NAMESPACE
        );
    });
}

function secureGet(storage, key){
    return new Promise((resolve, reject) => {
        storage.get(
            value => resolve(value),
            err => reject(err),
            key
        );
    });
}

function secureSet(storage, key, value){
    return new Promise((resolve, reject) => {
        storage.set(
            () => resolve(),
            err => reject(err),
            key,
            value
        );
    });
}

async function attemptRefreshLogin(){
    const loader = document.getElementById("loading");
    loader.innerText = "Verifying saved session...";

    try {
        const storage = await getSecureStorage();
        const refreshToken = await secureGet(storage, "refresh_token");

        if (!refreshToken) {
            launchKeycloakLogin();
            return;
        }

        loader.innerText = "Refreshing secure session...";
        const refreshResponse = await fetch(BACKEND_BASE_URL + "/mobile/auth/refresh", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ refreshToken })
        });

        if (!refreshResponse.ok) {
            launchKeycloakLogin();
            return;
        }

        const refreshed = await refreshResponse.json();
        if (!refreshed.accessToken) {
            launchKeycloakLogin();
            return;
        }

        await secureSet(storage, "access_token", refreshed.accessToken);
        if (refreshed.refreshToken) {
            await secureSet(storage, "refresh_token", refreshed.refreshToken);
        }

        loader.innerText = "Restoring app session...";
        const sessionResponse = await fetch(BACKEND_BASE_URL + "/mobile/auth/session/login", {
            method: "POST",
            credentials: "include",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ accessToken: refreshed.accessToken })
        });

        if (!sessionResponse.ok) {
            launchKeycloakLogin();
            return;
        }

        const sessionPayload = await sessionResponse.json();
        window.location.href = BACKEND_BASE_URL + (sessionPayload.redirectUrl || "/mobile/employee/dashboard");
    } catch (e) {
        console.log("Refresh login unavailable, falling back to OAuth login:", e);
        launchKeycloakLogin();
    }
}

function launchKeycloakLogin(){

    document.getElementById("loading").innerText = "Opening secure login...";
    const loginUrl = BACKEND_BASE_URL + "/mobile/biometric/bootstrap";

    window.location.href = loginUrl;

}

async function captureSessionTokens() {
    try {
        const response = await fetch(BACKEND_BASE_URL + "/mobile/auth/tokens", {
            method: "GET",
            credentials: "include"
        });
        if (!response.ok) return;
        const tokens = await response.json();
        if (!tokens || !tokens.refreshToken) return;
        const storage = await getSecureStorage();
        if (tokens.accessToken) await secureSet(storage, "access_token", tokens.accessToken);
        if (tokens.refreshToken) await secureSet(storage, "refresh_token", tokens.refreshToken);
        console.log("Mobile auth tokens captured to secure storage.");
    } catch (e) {
        console.log("Token capture skipped:", e);
    }
}

captureSessionTokens();

</script>

</body>
</html>
